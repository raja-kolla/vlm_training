# Paths — override via env vars in shell scripts
csv_path: training_data/csv/filtered_columns_cxr_0.3M.csv
image_folder: /root/bionicsuite1/home/ai-user/chest_classifier/disk/chest_images
llava_output_dir: training_data/llava

model:
  name: Qwen/Qwen3.5-4B
  max_image_side: 2048
  # Qwen3.5 patch size = 16; max side 2048 -> 128 tokens
  image_min_pixels: 65536   # 256 * 16 * 16
  image_max_pixels: 4194304 # 128 * 16 * 128 * 16 == 2048^2

training:
  phase1:
    freeze_llm: true
    freeze_vision_tower: false
    freeze_merger: false
    learning_rate: 1.0e-5
    vision_lr: 2.0e-6
    merger_lr: 1.0e-5
    output_dir: outputs/phase1_freeze_llm
  phase2:
    freeze_llm: false
    learning_rate: 5.0e-6
    output_dir: outputs/phase2_full_sft
